name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install pytest

      - name: Run pytest
        run: pytest tests/ -q

      - name: Validate default iterate.config.yaml
        run: python scripts/validate.py config config/iterate.config.yaml

      - name: Validate decision log template
        run: python scripts/validate.py decisions templates/iterate-decisions.template.md

      - name: Validate JSON schema is well-formed
        run: python -c "import json; json.load(open('config/config.schema.json'))"
